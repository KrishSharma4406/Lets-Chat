services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lets-chat-web
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: mongodb://db:27017/letschat
      NEXTAUTH_URL: http://localhost:3000
    command: sh -c "npx prisma db push && npm run start"
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - lets-chat-network

  db:
    image: mongo:7.0
    container_name: lets-chat-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - lets-chat-network

volumes:
  mongo_data:

networks:
  lets-chat-network:
    driver: bridge
